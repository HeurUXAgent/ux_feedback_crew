<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern SaaS Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --text-main: #111827;
            --text-muted: #6B7280;
            --bg-page: #F9FAFB;
            --bg-card: #FFFFFF;
            --border: #E5E7EB;
            --input-focus: #4F46E5;
            --annotation-color: #7C3AED;
            --radius: 8px;
            --transition: all 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Mobile-First Container (375px default) */
        .login-container {
            width: 100%;
            max-width: 375px;
            background: var(--bg-card);
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            position: relative;
        }

        /* Annotations Styling */
        .anno {
            position: absolute;
            font-size: 10px;
            font-weight: 600;
            color: var(--annotation-color);
            background: #F5F3FF;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            border: 1px solid #DDD6FE;
            pointer-events: none;
            z-index: 10;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 12px 16px; /* Increased padding */
            font-size: 16px; /* Prevents iOS zoom */
            border: 1px solid var(--border);
            border-radius: var(--radius);
            outline: none;
            transition: var(--transition);
            background: #fff;
        }

        input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            margin-top: 8px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            height: 48px; /* Mobile touch target */
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        /* Loading Indicator State */
        .loading-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            margin: 24px 0;
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-social {
            height: 44px;
            border: 1px solid var(--border);
            background: white;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-main);
        }

        .btn-social:hover {
            background: #F9FAFB;
            border-color: #D1D5DB;
        }

        .footer-text {
            text-align: center;
            margin-top: 32px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* Annotation placements */
        .anno-font { top: 45px; right: -20px; }
        .anno-padding { top: 220px; right: -40px; }
        .anno-forgot { top: 315px; left: -40px; }
        .anno-btn { top: 380px; right: -30px; }
        .anno-social { bottom: 85px; right: -20px; }
        .anno-contrast { top: 110px; left: -30px; }

        /* Responsive scaling for desktop viewing */
        @media (min-width: 768px) {
            body {
                background-image: radial-gradient(circle at 2px 2px, #E5E7EB 1px, transparent 0);
                background-size: 24px 24px;
            }
            .login-container {
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <!-- Annotation Labels -->
        <div class="anno anno-font">Modern Sans-Serif (Inter)</div>
        <div class="anno anno-contrast">Improved Contrast Ratio</div>
        <div class="anno anno-padding">Increased Input Padding</div>
        <div class="anno anno-forgot">Added Forgot Link</div>
        <div class="anno anno-btn">Full-width Primary Button</div>
        <div class="anno anno-social">Social Auth Integration</div>

        <div class="logo-area">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
            </div>
            <h1>Welcome back</h1>
            <p class="subtitle">Enter your credentials to access your account</p>
        </div>

        <form onsubmit="return false;">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-primary">
                <span>Sign in</span>
                <!-- Hidden by default, shown during interaction -->
                <div class="loading-spinner" style="display:none;"></div>
            </button>
        </form>

        <div class="divider">or continue with</div>

        <div class="social-grid">
            <button class="btn-social">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
            <button class="btn-social">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C4.1 16.78 3.52 9.39 6.34 7.5c1.4-.84 2.8-.46 3.6.04 1.02.6 1.8.58 2.94 0 .78-.42 2.38-.94 3.66.38 1.14.46 2.02 1.3 2.54 2.5-2.48 1.04-2.12 4.36.42 5.44-.56 1.44-1.34 2.86-2.45 4.42zM12.02 7.08c-.08-2.18 1.76-4.1 3.86-4.08.26 2.54-2.3 4.46-3.86 4.08z"/>
                </svg>
                Apple
            </button>
        </div>

        <p class="footer-text">
            Don't have an account? <a href="#">Sign up for free</a>
        </p>
    </div>

</body>
</html>
