<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Mobile UX Design</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --error: #d93025;
            --text-main: #202124;
            --text-muted: #5f6368;
            --bg-app: #f8f9fa;
            --bg-card: #ffffff;
            --radius: 8px;
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Mobile Container Simulation */
        .mobile-viewport {
            width: 360px;
            height: 800px;
            background: var(--bg-app);
            overflow-y: auto;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 8px solid #333;
            position: relative;
        }

        /* Annotations Style */
        .annotation {
            display: block;
            font-size: 10px;
            color: #888;
            font-style: italic;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Layout Parts */
        header {
            padding: var(--spacing-lg) var(--spacing-md);
            background: #fff;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            padding: var(--spacing-md);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        /* Feature: Optimized Image (Issue 2) */
        .card-image-wrapper {
            background: #eee;
            border-radius: var(--radius);
            overflow: hidden;
            height: 180px;
            position: relative;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Implementation: Lazy loading placeholder logic */
            transition: opacity 0.3s ease;
        }

        /* Feature: Error Message (Quick Win 2) */
        .error-container {
            padding: var(--spacing-sm);
            border-radius: var(--radius);
            background: #fce8e6;
            border-left: 4px solid var(--error);
        }

        .error-text {
            color: var(--error);
            font-weight: 600;
            font-size: 16px; /* Improved: Increased size */
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Feature: Accessible Button (Issue 1) */
        .btn-primary {
            background-color: var(--primary); /* Improved: High Contrast */
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            min-height: 48px; /* Improved: Large Touch Target */
            transition: background 0.2s, outline 0.1s;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
        }

        .btn-primary:focus {
            outline: 3px solid #ff9800; /* Improved: Clear keyboard focus */
            outline-offset: 2px;
        }

        /* Feature: Icon Buttons with Tooltips (Quick Win 1) */
        .action-row {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-sm);
        }

        .icon-btn {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Tooltip Logic */
        .icon-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .icon-btn:hover::after {
            opacity: 1;
        }

        /* Loading Indicator (Feedback Item 2) */
        .loading-skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: var(--radius);
            font-size: 16px;
        }

        h1 { font-size: 22px; font-weight: 700; }
        p { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

    </style>
</head>
<body>

    <div class="mobile-viewport">
        <header>
            <div>
                <h1>Checkout</h1>
            </div>
            <div style="display: flex; gap: 8px;">
                <span class="annotation">Tooltips added</span>
                <button class="icon-btn" data-tooltip="View Profile" aria-label="Profile">👤</button>
                <button class="icon-btn" data-tooltip="Help Center" aria-label="Help">❓</button>
            </div>
        </header>

        <div class="container">
            <!-- Hero Image Section -->
            <section>
                <span class="annotation">Optimized: Lazy loading & compression enabled</span>
                <div class="card-image-wrapper">
                    <!-- Added loading="lazy" for performance -->
                    <img src="https://images.unsplash.com/photo-1555529669-e69e7aa0ba9a?auto=format&fit=crop&w=360&q=80" 
                         alt="Product Showcase" 
                         class="card-image" 
                         loading="lazy">
                </div>
            </section>

            <!-- Error Feedback Section -->
            <section>
                <span class="annotation">Improved: Font size & visibility</span>
                <div class="error-container">
                    <div class="error-text">
                        <span>⚠️</span>
                        Payment method expired. Please update.
                    </div>
                </div>
            </section>

            <!-- Input Form -->
            <section class="input-group">
                <span class="annotation">Spacing & Labels added</span>
                <label for="card-number">Card Number</label>
                <input type="text" id="card-number" placeholder="0000 0000 0000 0000">
            </section>

            <!-- Primary Action -->
            <section>
                <span class="annotation">Accessible: High contrast + ARIA + Focus state</span>
                <button class="btn-primary" 
                        role="button" 
                        aria-label="Complete your purchase of fifty dollars">
                    Complete Purchase — $50.00
                </button>
            </section>

            <!-- Loading Placeholder Simulation -->
            <section>
                <span class="annotation">Added: Loading States</span>
                <div style="display:flex; gap:12px; align-items: center;">
                    <div class="loading-skeleton" style="width: 50px; height: 50px; border-radius: 50%;"></div>
                    <div style="flex:1;">
                        <div class="loading-skeleton" style="width: 70%; height: 12px; margin-bottom: 8px;"></div>
                        <div class="loading-skeleton" style="width: 40%; height: 10px;"></div>
                    </div>
                </div>
            </section>

            <!-- Quick Actions -->
            <section>
                <p>Quick Actions</p>
                <div class="action-row">
                    <button class="icon-btn" data-tooltip="Save for later" aria-label="Save">🔖</button>
                    <button class="icon-btn" data-tooltip="Share item" aria-label="Share">🔗</button>
                    <button class="icon-btn" data-tooltip="Delete item" aria-label="Delete">🗑️</button>
                </div>
            </section>
        </div>

        <!-- Navigation Bar (Simulated) -->
        <nav style="position: absolute; bottom: 0; width: 100%; height: 60px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center;">
            <div style="text-align: center; color: var(--primary);">
                <div style="font-size: 20px;">🏠</div>
                <div style="font-size: 10px; font-weight: bold;">Home</div>
            </div>
            <div style="text-align: center; color: var(--text-muted);">
                <div style="font-size: 20px;">🛍️</div>
                <div style="font-size: 10px;">Orders</div>
            </div>
            <div style="text-align: center; color: var(--text-muted);">
                <div style="font-size: 20px;">⚙️</div>
                <div style="font-size: 10px;">Settings</div>
            </div>
        </nav>
    </div>

</body>
</html>
