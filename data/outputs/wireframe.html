<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Profile - Drake - Wireframe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #FFFFFF;
            --secondary-bg: #F8F9FA;
            --accent-blue: #1E90FF;
            --text-main: #1A1A1A;
            --text-secondary: #555555; /* Improved from #AAAAAA for WCAG compliance */
            --text-muted: #707070;
            --mini-player-bg: #1C1C1E;
            --status-bar-height: 44px;
            --nav-height: 56px;
            --player-height: 64px;
            --skeleton-color: #EBEBEB;
            --skeleton-highlight: #F5F5F5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Phone Frame */
        .device-container {
            width: 375px;
            height: 812px;
            background-color: var(--primary-bg);
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 8px solid #333;
        }

        /* Annotations Overlay Style */
        .annotation {
            position: absolute;
            font-size: 10px;
            background: rgba(30, 144, 255, 0.1);
            color: var(--accent-blue);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(30, 144, 255, 0.3);
            pointer-events: none;
            z-index: 100;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Status Bar */
        .status-bar {
            height: var(--status-bar-height);
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            z-index: 20;
        }

        /* Navigation */
        .nav-bar {
            height: var(--nav-height);
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: var(--status-bar-height);
            width: 100%;
            z-index: 20;
            background: linear-gradient(to bottom, rgba(70, 130, 180, 0.4), transparent);
        }

        .nav-icon {
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .nav-icon:active {
            transform: scale(0.9);
        }

        .heart-active {
            color: #FF2D55; /* Visual feedback for favorited state */
        }

        /* Content Area */
        .scroll-container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 100px;
            scrollbar-width: none;
        }

        .scroll-container::-webkit-scrollbar {
            display: none;
        }

        /* Hero Section */
        .hero-section {
            padding: 20px 20px 30px;
            text-align: center;
            position: relative;
            background: linear-gradient(180deg, #4682B4 0%, #FFFFFF 100%);
        }

        .profile-pic-container {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }

        .profile-pic {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #FFF;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .play-fab {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 56px;
            height: 56px;
            background-color: var(--accent-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(30, 144, 255, 0.4);
            cursor: pointer;
            transition: background 0.2s;
        }

        .play-fab:active {
            background-color: #187bcd;
        }

        .artist-name {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .bio-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* List Sections */
        .section {
            padding: 0 20px;
            margin-top: 32px;
        }

        .section-header {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Song List Item */
        .list-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 0;
            cursor: pointer;
            transition: opacity 0.1s;
        }

        .list-item:active {
            opacity: 0.6;
        }

        .rank {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-muted);
            width: 20px;
        }

        .thumbnail {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            background-color: var(--skeleton-color);
            object-fit: cover;
        }

        .song-info {
            flex: 1;
        }

        .song-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .song-meta {
            font-size: 13px;
            color: var(--text-secondary); /* High contrast adjusted */
            font-weight: 500;
        }

        /* Skeleton Loading State Demonstration */
        .skeleton {
            background: linear-gradient(90deg, var(--skeleton-color) 25%, var(--skeleton-highlight) 50%, var(--skeleton-color) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-text {
            height: 12px;
            width: 60%;
            margin-bottom: 8px;
        }

        .skeleton-text-sm {
            height: 10px;
            width: 40%;
        }

        /* Mini Player */
        .mini-player {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 84px; /* Includes safe area padding */
            background-color: var(--mini-player-bg);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 30;
        }

        .progress-container {
            width: 100%;
            height: 3px;
            background-color: #333;
        }

        .progress-bar {
            width: 65%;
            height: 100%;
            background-color: #FF3B30;
        }

        .player-content {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        .player-thumb {
            width: 40px;
            height: 40px;
            border-radius: 4px;
        }

        .player-info {
            flex: 1;
            overflow: hidden;
        }

        .player-title {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-artist {
            font-size: 12px;
            color: #999;
        }

        .player-controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .player-btn {
            font-size: 18px;
            cursor: pointer;
        }

        .thumbs-active {
            color: var(--accent-blue);
        }

        /* Home Indicator */
        .home-indicator {
            width: 134px;
            height: 5px;
            background-color: rgba(255,255,255,0.3);
            border-radius: 100px;
            align-self: center;
            margin-bottom: 8px;
        }

        /* UI Enhancements annotations */
        .label-contrast { top: 485px; left: 85px; }
        .label-feedback { top: 100px; right: 20px; }
        .label-skeleton { top: 680px; left: 20px; }
        .label-touch { bottom: 30px; right: 20px; }

    </style>
</head>
<body>

    <div class="device-container">
        <!-- Status Bar -->
        <div class="status-bar">
            <span>2:34 PM</span>
            <div style="display: flex; gap: 6px;">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-bar">
            <div class="nav-icon"><i class="fas fa-chevron-left"></i></div>
            <div style="display: flex;">
                <div class="nav-icon"><i class="fas fa-heart heart-active"></i></div>
                <div class="nav-icon"><i class="fas fa-arrow-up-from-bracket"></i></div>
            </div>
        </div>
        <div class="annotation label-feedback">Active Feedback: Filled Heart</div>

        <!-- Scrollable Content -->
        <div class="scroll-container">
            
            <!-- Hero -->
            <div class="hero-section">
                <div class="profile-pic-container">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Drake" alt="Drake" class="profile-pic">
                    <div class="play-fab">
                        <i class="fas fa-play"></i>
                    </div>
                </div>
                <h1 class="artist-name">Drake</h1>
                <div class="bio-btn">
                    BIO <i class="fas fa-circle-info"></i>
                </div>
            </div>

            <!-- Latest Release -->
            <div class="section">
                <div class="section-header">LATEST RELEASE</div>
                <div class="list-item">
                    <img src="https://api.dicebear.com/7.x/shapes/svg?seed=ScaryHours" alt="Album" class="thumbnail">
                    <div class="song-info">
                        <div class="song-title">Two Birds, One Stone</div>
                        <div class="song-meta">Oct. 2016 • 1 song</div>
                    </div>
                    <div class="nav-icon" style="color: var(--text-muted)"><i class="fas fa-ellipsis"></i></div>
                </div>
                <div class="annotation label-contrast">WCAG Compliant Contrast (#555)</div>
            </div>

            <!-- Top Songs -->
            <div class="section">
                <div class="section-header">TOP SONGS</div>
                
                <div class="list-item">
                    <span class="rank">1</span>
                    <img src="https://api.dicebear.com/7.x/shapes/svg?seed=Views" alt="Song" class="thumbnail">
                    <div class="song-info">
                        <div class="song-title">One Dance</div>
                        <div class="song-meta">2,145,678,901 plays</div>
                    </div>
                    <div class="nav-icon" style="color: var(--text-muted)"><i class="fas fa-ellipsis"></i></div>
                </div>

                <div class="list-item">
                    <span class="rank">2</span>
                    <img src="https://api.dicebear.com/7.x/shapes/svg?seed=TakeCare" alt="Song" class="thumbnail">
                    <div class="song-info">
                        <div class="song-title">The Motto</div>
                        <div class="song-meta">1,002,455,122 plays</div>
                    </div>
                    <div class="nav-icon" style="color: var(--text-muted)"><i class="fas fa-ellipsis"></i></div>
                </div>

                <!-- Skeleton State Mockup for Improvement Demo -->
                <div class="list-item" style="opacity: 0.8;">
                    <span class="rank">3</span>
                    <div class="thumbnail skeleton"></div>
                    <div class="song-info">
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text-sm"></div>
                    </div>
                    <div class="nav-icon" style="color: var(--text-muted)"><i class="fas fa-ellipsis"></i></div>
                </div>
                <div class="annotation label-skeleton">Skeleton Loading State Demo</div>
            </div>
        </div>

        <!-- Mini Player -->
        <div class="mini-player">
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            <div class="player-content">
                <img src="https://api.dicebear.com/7.x/shapes/svg?seed=Closer" alt="Now Playing" class="player-thumb">
                <div class="player-info">
                    <div class="player-title">Closer (feat. Halsey)</div>
                    <div class="player-artist">The Chainsmokers</div>
                </div>
                <div class="player-controls">
                    <i class="far fa-thumbs-down player-btn"></i>
                    <i class="fas fa-pause player-btn"></i>
                    <i class="fas fa-thumbs-up player-btn thumbs-active"></i>
                </div>
            </div>
            <div class="annotation label-touch">44px+ Touch Targets</div>
            <div class="home-indicator"></div>
        </div>
    </div>

</body>
</html>
